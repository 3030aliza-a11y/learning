<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<meta name="theme-color" content="#d1373f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Học Tiếng Trung">
<title>学中文 · Học Tiếng Trung Cơ Bản</title>
<style>
  :root{
    --red:#d1373f; --red-dark:#a8232a; --gold:#c9a24a; --ink:#2b2320;
    --paper:#fffaf3; --card:#ffffff; --line:#eadfcd; --muted:#8a7c68;
    --green:#3f9142; --shadow:0 6px 20px rgba(43,35,32,.08);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif;}
  .hanzi{font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC","Heiti SC",sans-serif;}

  header{background:linear-gradient(135deg,var(--red),var(--red-dark));color:#fff;
    padding:22px 16px 60px;text-align:center;position:relative;}
  header h1{margin:0 0 6px;font-size:26px;letter-spacing:.5px;}
  header h1 .hanzi{font-size:30px;margin-right:8px;}
  header p{margin:0;opacity:.9;font-size:14px;}
  .streak-badge{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.18);
    padding:6px 12px;border-radius:999px;font-size:13px;font-weight:700;}

  .speak-btn{background:none;border:1px solid var(--line);color:var(--red);
    width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;}
  .speak-btn:hover{background:#fdeceb;}

  nav{max-width:900px;margin:-40px auto 0;padding:0 12px;position:relative;z-index:2;
    display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  nav button{background:var(--card);border:1px solid var(--line);color:var(--ink);
    padding:12px 18px;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;
    box-shadow:var(--shadow);transition:.15s;}
  nav button.active{background:var(--red);color:#fff;border-color:var(--red);}
  nav button:hover{transform:translateY(-1px);}

  main{max-width:900px;margin:0 auto;padding:28px 16px 60px;}
  .panel{display:none;}
  .panel.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  .cats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
  .cats button{background:var(--card);border:1px solid var(--line);color:var(--muted);
    padding:8px 14px;border-radius:999px;font-size:13px;cursor:pointer;font-weight:600;}
  .cats button.active{background:var(--gold);color:#fff;border-color:var(--gold);}

  /* Vocabulary grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
  .word-card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:16px 10px;text-align:center;box-shadow:var(--shadow);position:relative;}
  .word-card .hanzi{font-size:34px;line-height:1.1;}
  .word-card .pinyin{color:var(--red);font-size:14px;margin-top:6px;font-weight:600;}
  .word-card .meaning{color:var(--muted);font-size:13px;margin-top:4px;}
  .word-card .speak-btn{position:absolute;top:8px;left:10px;}
  .star{position:absolute;top:8px;right:10px;cursor:pointer;font-size:15px;color:#ddd;}
  .star.on{color:var(--gold);}

  .hint{color:var(--muted);font-size:13px;text-align:center;margin-bottom:14px;}

  /* Flashcards */
  .fc-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;}
  .fc-progress{width:100%;max-width:360px;height:8px;background:var(--line);border-radius:99px;overflow:hidden;}
  .fc-progress-bar{height:100%;background:var(--green);width:0%;transition:.3s;}
  .fc-counter{font-size:13px;color:var(--muted);}
  .flashcard{width:100%;max-width:360px;height:230px;perspective:1000px;cursor:pointer;}
  .flashcard-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;}
  .flashcard.flipped .flashcard-inner{transform:rotateY(180deg);}
  .fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;
    background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;}
  .fc-face.back{transform:rotateY(180deg);}
  .fc-face .hanzi{font-size:64px;}
  .fc-face .pinyin{color:var(--red);font-size:20px;margin-top:10px;font-weight:600;}
  .fc-face .meaning{font-size:24px;font-weight:700;color:var(--ink);}
  .fc-face .sub{color:var(--muted);font-size:14px;margin-top:8px;}
  .fc-face .speak-btn{position:absolute;top:10px;right:10px;}
  .fc-hint{font-size:12px;color:var(--muted);}
  .fc-actions{display:flex;gap:12px;}
  .fc-actions button{padding:12px 22px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;}
  .btn-no{background:#fdeceb;color:var(--red-dark);}
  .btn-yes{background:#e8f5e9;color:var(--green);}
  .fc-reset{background:none;border:none;color:var(--muted);text-decoration:underline;cursor:pointer;font-size:13px;}
  .fc-done{text-align:center;color:var(--muted);padding:40px 0;}

  /* Quiz */
  .quiz-start{text-align:center;padding:30px 0;}
  .quiz-start button, .qz-restart{background:var(--red);color:#fff;border:none;padding:14px 28px;
    border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-top:14px;}
  .qz-score{font-size:13px;color:var(--muted);text-align:center;margin-bottom:10px;}
  .qz-q{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:30px 16px;
    text-align:center;box-shadow:var(--shadow);margin-bottom:16px;}
  .qz-q{position:relative;}
  .qz-q .hanzi{font-size:56px;}
  .qz-q .pinyin{color:var(--red);font-size:16px;margin-top:8px;font-weight:600;}
  .qz-q .speak-btn{position:absolute;top:10px;right:10px;}
  .qz-choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .qz-choices button{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px 10px;font-size:15px;cursor:pointer;font-weight:600;color:var(--ink);}
  .qz-choices button.correct{background:#e8f5e9;border-color:var(--green);color:var(--green);}
  .qz-choices button.wrong{background:#fdeceb;border-color:var(--red);color:var(--red-dark);}
  .qz-choices button:disabled{cursor:default;}
  .qz-next{display:block;margin:16px auto 0;background:var(--gold);color:#fff;border:none;
    padding:10px 22px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
  .qz-result{text-align:center;padding:30px 0;}
  .qz-result .big{font-size:40px;font-weight:800;color:var(--red);}

  /* Writing */
  .write-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;}
  .write-info{text-align:center;position:relative;display:flex;align-items:center;gap:10px;}
  .write-info .pinyin{color:var(--red);font-weight:700;font-size:18px;}
  .write-info .meaning{color:var(--muted);font-size:14px;}
  .char-writers{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  .tian{width:150px;height:150px;background:var(--card);border:2px solid var(--gold);border-radius:12px;
    position:relative;box-shadow:var(--shadow);touch-action:none;}
  .tian::before,.tian::after{content:"";position:absolute;background:var(--line);pointer-events:none;}
  .tian::before{left:50%;top:0;bottom:0;width:1px;}
  .tian::after{top:50%;left:0;right:0;height:1px;}
  .write-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .write-actions button{padding:10px 18px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;}
  .btn-clear{background:#fdeceb;color:var(--red-dark);}
  .btn-next{background:var(--red);color:#fff;}
  .write-feedback{min-height:20px;font-size:14px;color:var(--green);font-weight:600;text-align:center;}

  footer{text-align:center;color:var(--muted);font-size:12px;padding:20px;}
</style>
</head>
<body>

<header>
  <div class="streak-badge" id="streakBadge"></div>
  <h1><span class="hanzi">学中文</span>Học Tiếng Trung Cơ Bản</h1>
  <p>Từ vựng · chữ Hán · pinyin · phát âm · luyện viết · trắc nghiệm</p>
</header>

<nav>

  <button data-tab="flash">🃏 Thẻ ghi nhớ</button>
  <button data-tab="quiz">📝 Trắc nghiệm</button>
  <button data-tab="write">✍️ Luyện viết</button>
</nav>

<main>

  <!-- VOCAB -->
  <section id="vocab" class="panel active">
    <div class="cats" id="vocabCats"></div>
    <div class="hint">Nhấn ★ để đánh dấu từ đã thuộc</div>
    <div class="grid" id="vocabGrid"></div>
  </section>

  <!-- FLASHCARDS -->
  <section id="flash" class="panel">
    <div class="cats" id="flashCats"></div>
    <div class="fc-wrap">
      <div class="fc-progress"><div class="fc-progress-bar" id="fcBar"></div></div>
      <div class="fc-counter" id="fcCounter"></div>
      <div class="flashcard" id="fcCard">
        <div class="flashcard-inner">
          <div class="fc-face front">
            <button class="speak-btn" id="fcSpeakFront">🔊</button>
            <div class="hanzi" id="fcHanzi"></div>
            <div class="fc-hint">Nhấn để xem nghĩa</div>
          </div>
          <div class="fc-face back">
            <button class="speak-btn" id="fcSpeakBack">🔊</button>
            <div class="meaning" id="fcMeaning"></div>
            <div class="pinyin" id="fcPinyin"></div>
            <div class="sub" id="fcHanziSmall"></div>
          </div>
        </div>
      </div>
      <div class="fc-actions">
        <button class="btn-no" id="fcNo">✗ Chưa thuộc</button>
        <button class="btn-yes" id="fcYes">✓ Đã thuộc</button>
      </div>
      <div id="fcDoneWrap"></div>
      <button class="fc-reset" id="fcReset">Đặt lại tiến độ chủ đề này</button>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="panel">
    <div class="cats" id="quizCats"></div>
    <div id="quizArea"></div>
  </section>

  <!-- WRITING -->
  <section id="write" class="panel">
    <div class="cats" id="writeCats"></div>
    <div class="hint">Bấm "Xem thứ tự nét" để xem cách viết, rồi bấm "Kiểm tra viết" để tự viết và được chấm điểm</div>
    <div class="write-wrap">
      <div class="write-info">
        <button class="speak-btn" id="wSpeak">🔊</button>
        <div>
          <div class="pinyin" id="wPinyin"></div>
          <div class="meaning" id="wMeaning"></div>
        </div>
      </div>
      <div class="char-writers" id="charWriters"></div>
      <div class="write-feedback" id="wFeedback"></div>
      <div class="write-actions">
        <button class="btn-clear" id="wAnimate">▶ Xem thứ tự nét</button>
        <button class="btn-clear" id="wQuiz">✏️ Kiểm tra viết</button>
        <button class="btn-next" id="wNext">Từ tiếp theo →</button>
      </div>
    </div>
  </section>

</main>

<footer>做中文学习，一步一步来 · Học từng chút một, mỗi ngày một chữ</footer>

<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.7.3/dist/hanzi-writer.min.js"></script>
<script>
function speak(text){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "zh-CN";
  utter.rate = 0.8;
  speechSynthesis.speak(utter);
}

function localDateStr(d){
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function updateStreak(){
  const key = "hoctiengtrung_streak_v1";
  const todayStr = localDateStr(new Date());
  let data;
  try{ data = JSON.parse(localStorage.getItem(key)) || {}; }catch(e){ data = {}; }
  if(data.lastDate !== todayStr){
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate()-1);
    data.streak = (data.lastDate === localDateStr(yesterday)) ? (data.streak||0)+1 : 1;
    data.lastDate = todayStr;
    localStorage.setItem(key, JSON.stringify(data));
  }
  document.getElementById("streakBadge").textContent = `🔥 ${data.streak||1} ngày liên tiếp`;
}
updateStreak();

  {c:"是",p:"shì",m:"là",cat:"Động từ"},
  {c:"有",p:"yǒu",m:"có",cat:"Động từ"},
  {c:"去",p:"qù",m:"đi",cat:"Động từ"},
  {c:"来",p:"lái",m:"đến",cat:"Động từ"},
  {c:"吃",p:"chī",m:"ăn",cat:"Động từ"},
  {c:"喝",p:"hē",m:"uống",cat:"Động từ"},
  {c:"看",p:"kàn",m:"xem, nhìn",cat:"Động từ"},
  {c:"说",p:"shuō",m:"nói",cat:"Động từ"},
  {c:"听",p:"tīng",m:"nghe",cat:"Động từ"},
  {c:"写",p:"xiě",m:"viết",cat:"Động từ"},
  {c:"学习",p:"xuéxí",m:"học",cat:"Động từ"},
  {c:"爱",p:"ài",m:"yêu",cat:"Động từ"},
  {c:"喜欢",p:"xǐhuan",m:"thích",cat:"Động từ"},
  {c:"想",p:"xiǎng",m:"muốn, nghĩ",cat:"Động từ"},

  // Tính từ
  {c:"好",p:"hǎo",m:"tốt, đẹp",cat:"Tính từ"},
  {c:"大",p:"dà",m:"to, lớn",cat:"Tính từ"},
  {c:"小",p:"xiǎo",m:"nhỏ",cat:"Tính từ"},
  {c:"多",p:"duō",m:"nhiều",cat:"Tính từ"},
  {c:"少",p:"shǎo",m:"ít",cat:"Tính từ"},
  {c:"高",p:"gāo",m:"cao",cat:"Tính từ"},
  {c:"漂亮",p:"piàoliang",m:"xinh đẹp",cat:"Tính từ"},
  {c:"忙",p:"máng",m:"bận",cat:"Tính từ"},
];
VOCAB.forEach((w,i)=>w.id=i);

const CATS = [...new Set(VOCAB.map(w=>w.cat))];
const ALL_LABEL = "Tất cả";

const store = {
  key:"hoctiengtrung_known_v1",
  get(){ try{return JSON.parse(localStorage.getItem(this.key))||{};}catch(e){return {};} },
  set(obj){ localStorage.setItem(this.key, JSON.stringify(obj)); },
  isKnown(id){ return !!this.get()[id]; },
  setKnown(id, val){ const o=this.get(); if(val) o[id]=true; else delete o[id]; this.set(o); }
};

// ---- Tabs ----
document.querySelectorAll("nav button").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(btn.dataset.tab).classList.add("active");
  });
});

function buildCatButtons(container, onChange, includeAll=true){
  container.innerHTML = "";
  const labels = includeAll ? [ALL_LABEL, ...CATS] : [...CATS];
  let current = labels[0];
  labels.forEach(label=>{
    const b = document.createElement("button");
    b.textContent = label;
    if(label===current) b.classList.add("active");
    b.addEventListener("click", ()=>{
      container.querySelectorAll("button").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      current = label;
      onChange(label);
    });
    container.appendChild(b);
  });
  return { get:()=>current };
}
function wordsFor(cat){ return cat===ALL_LABEL ? VOCAB : VOCAB.filter(w=>w.cat===cat); }

// ---- VOCAB TAB ----
const vocabGrid = document.getElementById("vocabGrid");
function renderVocab(cat){
  vocabGrid.innerHTML = "";
  wordsFor(cat).forEach(w=>{
    const card = document.createElement("div");
    card.className = "word-card";
    const known = store.isKnown(w.id);
    card.innerHTML = `
      <button class="speak-btn">🔊</button>
      <span class="star ${known?"on":""}" data-id="${w.id}">★</span>
      <div class="hanzi">${w.c}</div>
      <div class="pinyin">${w.p}</div>
      <div class="meaning">${w.m}</div>`;
    card.querySelector(".star").addEventListener("click", (e)=>{
      const nowKnown = !store.isKnown(w.id);
      store.setKnown(w.id, nowKnown);
      e.target.classList.toggle("on", nowKnown);
    });
    card.querySelector(".speak-btn").addEventListener("click", ()=> speak(w.c));
    vocabGrid.appendChild(card);
  });
}
buildCatButtons(document.getElementById("vocabCats"), renderVocab);
renderVocab(ALL_LABEL);

// ---- FLASHCARDS TAB ----
let fcQueue = [], fcCurrent = null;
const fcCardEl = document.getElementById("fcCard");
const fcBar = document.getElementById("fcBar");
const fcCounter = document.getElementById("fcCounter");
const fcDoneWrap = document.getElementById("fcDoneWrap");

function startFlash(cat){
  const words = wordsFor(cat);
  fcQueue = words.filter(w=>!store.isKnown(w.id));
  fcCardEl.style.display = "";
  document.querySelector(".fc-actions").style.display = "flex";
  fcDoneWrap.innerHTML = "";
  nextFlash(words.length);
}
function updateFcProgress(total){
  const known = wordsFor(fcCatState.get()).filter(w=>store.isKnown(w.id)).length;
  fcBar.style.width = total ? (known/total*100)+"%" : "0%";
  fcCounter.textContent = `Đã thuộc: ${known}/${total}`;
}
function nextFlash(total){
  updateFcProgress(total);
  if(fcQueue.length === 0){
    fcCardEl.style.display = "none";
    document.querySelector(".fc-actions").style.display = "none";
    fcDoneWrap.innerHTML = `<div class="fc-done">🎉 Bạn đã ôn hết chủ đề này!</div>`;
    return;
  }
  fcCurrent = fcQueue[Math.floor(Math.random()*fcQueue.length)];
  fcCardEl.classList.remove("flipped");
  document.getElementById("fcHanzi").textContent = fcCurrent.c;
  document.getElementById("fcMeaning").textContent = fcCurrent.m;
  document.getElementById("fcPinyin").textContent = fcCurrent.p;
  document.getElementById("fcHanziSmall").textContent = fcCurrent.c;
}
fcCardEl.addEventListener("click", ()=> fcCardEl.classList.toggle("flipped"));
document.getElementById("fcSpeakFront").addEventListener("click", (e)=>{
  e.stopPropagation();
  if(fcCurrent) speak(fcCurrent.c);
});
document.getElementById("fcSpeakBack").addEventListener("click", (e)=>{
  e.stopPropagation();
  if(fcCurrent) speak(fcCurrent.c);
});
document.getElementById("fcYes").addEventListener("click", ()=>{
  if(!fcCurrent) return;
  store.setKnown(fcCurrent.id, true);
  fcQueue = fcQueue.filter(w=>w.id!==fcCurrent.id);
  nextFlash(wordsFor(fcCatState.get()).length);
});
document.getElementById("fcNo").addEventListener("click", ()=>{
  if(!fcCurrent) return;
  store.setKnown(fcCurrent.id, false);
  nextFlash(wordsFor(fcCatState.get()).length);
});
document.getElementById("fcReset").addEventListener("click", ()=>{
  const o = store.get();
  wordsFor(fcCatState.get()).forEach(w=>delete o[w.id]);
  store.set(o);
  startFlash(fcCatState.get());
});
const fcCatState = buildCatButtons(document.getElementById("flashCats"), startFlash);
startFlash(ALL_LABEL);

// ---- QUIZ TAB ----
const quizArea = document.getElementById("quizArea");
let quizWords = [], quizIndex = 0, quizScore = 0, quizOrder = [];

function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }

function startQuiz(cat){
  const words = wordsFor(cat);
  if(words.length < 4){
    quizArea.innerHTML = `<div class="quiz-start">Chủ đề này cần ít nhất 4 từ để làm trắc nghiệm.</div>`;
    return;
  }
  quizWords = words;
  quizArea.innerHTML = `<div class="quiz-start">
    <div>Sẵn sàng kiểm tra <b>${words.length}</b> từ chủ đề "<b>${cat}</b>"?</div>
    <button id="quizGo">Bắt đầu trắc nghiệm</button>
  </div>`;
  document.getElementById("quizGo").addEventListener("click", ()=>{
    quizOrder = shuffle(words).slice(0, Math.min(10, words.length));
    quizIndex = 0; quizScore = 0;
    renderQuizQuestion();
  });
}
function renderQuizQuestion(){
  if(quizIndex >= quizOrder.length){
    quizArea.innerHTML = `<div class="qz-result">
      <div>Kết quả của bạn</div>
      <div class="big">${quizScore}/${quizOrder.length}</div>
      <button class="qz-restart" id="qzRestart">Làm lại</button>
    </div>`;
    document.getElementById("qzRestart").addEventListener("click", ()=>startQuiz(quizCatState.get()));
    return;
  }
  const word = quizOrder[quizIndex];
  const distractors = shuffle(quizWords.filter(w=>w.id!==word.id)).slice(0,3);
  const choices = shuffle([word, ...distractors]);
  quizArea.innerHTML = `
    <div class="qz-score">Câu ${quizIndex+1}/${quizOrder.length} · Điểm: ${quizScore}</div>
    <div class="qz-q">
      <button class="speak-btn" id="qzSpeak">🔊</button>
      <div class="hanzi">${word.c}</div>
      <div class="pinyin">${word.p}</div>
    </div>
    <div class="qz-choices" id="qzChoices"></div>`;
  document.getElementById("qzSpeak").addEventListener("click", ()=> speak(word.c));
  const choicesEl = document.getElementById("qzChoices");
  choices.forEach(ch=>{
    const b = document.createElement("button");
    b.textContent = ch.m;
    b.addEventListener("click", ()=>{
      const buttons = choicesEl.querySelectorAll("button");
      buttons.forEach(x=>x.disabled = true);
      if(ch.id === word.id){
        b.classList.add("correct");
        quizScore++;
      } else {
        b.classList.add("wrong");
        buttons.forEach(x=>{ if(x.textContent===word.m) x.classList.add("correct"); });
      }
      const next = document.createElement("button");
      next.className = "qz-next";
      next.textContent = quizIndex+1 < quizOrder.length ? "Câu tiếp theo →" : "Xem kết quả →";
      next.addEventListener("click", ()=>{ quizIndex++; renderQuizQuestion(); });
      quizArea.appendChild(next);
    });
    choicesEl.appendChild(b);
  });
}
const quizCatState = buildCatButtons(document.getElementById("quizCats"), startQuiz);
startQuiz(ALL_LABEL);

// ---- WRITING TAB (HanziWriter: stroke order + graded quiz) ----
let writeWords = [], writeIdx = 0, writers = [];
const wFeedback = document.getElementById("wFeedback");

function buildCharWriters(word){
  const container = document.getElementById("charWriters");
  container.innerHTML = "";
  writers = [];
  const chars = Array.from(word.c).filter(ch => /[㐀-鿿]/.test(ch));
  chars.forEach((ch, i)=>{
    const box = document.createElement("div");
    box.className = "tian";
    box.id = "char-target-" + i;
    container.appendChild(box);
  });
  chars.forEach((ch, i)=>{
    const writer = HanziWriter.create("char-target-" + i, ch, {
      width: 150,
      height: 150,
      padding: 5,
      showOutline: true,
      showCharacter: false,
      strokeAnimationSpeed: 1,
      delayBetweenStrokes: 300,
      strokeColor: "#a8232a",
      outlineColor: "#eadfcd",
      drawingWidth: 24
    });
    writers.push(writer);
  });
}

function startWrite(cat){
  writeWords = shuffle(wordsFor(cat));
  writeIdx = 0;
  showWriteWord();
}
function showWriteWord(){
  if(writeWords.length===0) return;
  if(writeIdx >= writeWords.length) writeIdx = 0;
  const w = writeWords[writeIdx];
  document.getElementById("wPinyin").textContent = w.p;
  document.getElementById("wMeaning").textContent = w.m;
  wFeedback.textContent = "";
  buildCharWriters(w);
}
document.getElementById("wSpeak").addEventListener("click", ()=>{
  const w = writeWords[writeIdx];
  if(w) speak(w.c);
});
document.getElementById("wAnimate").addEventListener("click", ()=>{
  writers.forEach((writer, i)=> setTimeout(()=> writer.animateCharacter(), i*1300));
});
document.getElementById("wQuiz").addEventListener("click", ()=>{
  if(writers.length===0) return;
  wFeedback.textContent = `Hãy viết vào ô 1/${writers.length}...`;
  let idx = 0;
  function quizNext(){
    if(idx >= writers.length){
      wFeedback.textContent = "🎉 Hoàn thành! Bấm 'Từ tiếp theo' để học chữ khác.";
      return;
    }
    writers[idx].quiz({
      onComplete: (summary)=>{
        idx++;
        if(idx < writers.length){
          wFeedback.textContent = `Đúng! (sai ${summary.totalMistakes} lần) — viết tiếp ô ${idx+1}/${writers.length}...`;
        }
        setTimeout(quizNext, 500);
      }
    });
  }
  quizNext();
});
document.getElementById("wNext").addEventListener("click", ()=>{
  writeIdx++; showWriteWord();
});
buildCatButtons(document.getElementById("writeCats"), startWrite);
startWrite(ALL_LABEL);
</script>
